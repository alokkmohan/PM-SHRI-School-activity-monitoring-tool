<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM SHRI School Activity Monitoring Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f1f5fb;
  }

  .tricolor {
    height: 5px;
    flex-shrink: 0;
    background: linear-gradient(90deg, #FF9933 33.33%, #ffffff 33.33% 66.66%, #138808 66.66%);
  }

  header {
    flex-shrink: 0;
    background: linear-gradient(135deg, #0d2657 0%, #1565c0 100%);
    color: white;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .brand-logo {
    height: 44px;
    width: auto;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.25));
    flex-shrink: 0;
  }
  .brand-divider {
    width: 1px; height: 36px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 0.88rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.25;
  }
  .brand-text p {
    font-size: 0.63rem;
    color: rgba(255,255,255,0.65);
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .badge-gov {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.67rem;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
  }
  @media (max-width: 500px) { .badge-gov { display: none; } }

  .frame-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Loading indicator while iframe loads */
  .frame-loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f1f5fb;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .frame-loader.hidden { opacity: 0; }
  .loader-spinner {
    width: 40px; height: 40px;
    border: 4px solid #c5cae9;
    border-top-color: #1565c0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .frame-loader p { font-size: 0.85rem; color: #64748b; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tricolor"></div>

<header>
  <div class="brand">
    <img class="brand-logo"
         src="https://pmshri.education.gov.in/static/media/pm-shri.ec4909ab870a611f73d7.png"
         alt="PM SHRI Logo"
         onerror="this.src='assets/pmshri-logo.png'">
    <div class="brand-divider"></div>
    <div class="brand-text">
      <h1>PM SHRI School Activity Monitoring Dashboard</h1>
      <p>Samagra Shiksha &nbsp;|&nbsp; Secondary Education Department, Govt. of Uttar Pradesh</p>
    </div>
  </div>
  <div class="header-right">
    <span class="badge-gov">&#127787; Samagra Shiksha &bull; Secondary Education Dept., UP</span>
  </div>
</header>

<div class="frame-wrap">
  <div class="frame-loader" id="loader">
    <div class="loader-spinner"></div>
    <p>Loading form...</p>
  </div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbwxr5ZkOYf8ARU0-NPgB46vkSmZBbWqkPBSy0bPUoHUfR2nVi8zMn5gv04W_RSjLMSy/exec"
    title="PM SHRI Activity Monitoring Form"
    onload="document.getElementById('loader').classList.add('hidden')"
    allow="camera; microphone">
  </iframe>
</div>

</body>
</html>
